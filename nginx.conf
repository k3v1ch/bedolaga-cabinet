server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # index.html — всегда ревалидировать: иначе браузеры кэшируют его
    # эвристически и после деплоя пользователи сидят на старом бандле
    # (ассеты хэшированы и кэшируются на год — это ок).
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API проксировать, если нужно
    location /api/ {
        try_files $uri /index.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: кэширование статических файлов
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
