# Дев-кабинет keldari.online. Запуск: docker compose -f docker-compose.keldari.yml -p keldari-cabinet up -d
services:
  cabinet-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME}
        VITE_APP_NAME: ${VITE_APP_NAME:-Cabinet}
        VITE_APP_LOGO: ${VITE_APP_LOGO:-V}
        VITE_USE_NEW_SHELL: ${VITE_USE_NEW_SHELL:-true}
    image: keldari-cabinet:latest
    container_name: keldari_cabinet
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '127.0.0.1:${CABINET_PORT:-3021}:80'
    networks:
      - default
      - remnawave-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:80/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  default:
    name: keldari-cabinet_default
  remnawave-network:
    external: true
